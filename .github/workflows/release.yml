name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Change to your preferred Go version

      - name: Build and Package
        run: pwsh ./build.ps1 -Version ${{ github.ref_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/gopass-master-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/gopass-master-${{ github.ref_name }}-windows-amd64.zip
            dist/gopass-agent-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/gopass-agent-${{ github.ref_name }}-windows-amd64.zip
          generate_release_notes: true
